<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Cream background circle (border ring) -->
  <circle cx="256" cy="256" r="244" fill="#F7F3E9" stroke="#E8DFD0" stroke-width="4"/>

  <!-- Warm gold main circle -->
  <circle cx="256" cy="256" r="204" fill="#F4A460"/>

  <!-- Subtle inner glow for depth -->
  <circle cx="256" cy="256" r="204" fill="url(#innerGlow512)"/>

  <!-- Playful dots decoration around the cream ring -->
  <circle cx="256" cy="24" r="10" fill="#F4A460" opacity="0.6"/>
  <circle cx="400" cy="72" r="9" fill="#F4A460" opacity="0.5"/>
  <circle cx="472" cy="180" r="8" fill="#F4A460" opacity="0.4"/>
  <circle cx="472" cy="332" r="9" fill="#F4A460" opacity="0.5"/>
  <circle cx="400" cy="440" r="10" fill="#F4A460" opacity="0.6"/>
  <circle cx="256" cy="488" r="9" fill="#F4A460" opacity="0.5"/>
  <circle cx="112" cy="440" r="8" fill="#F4A460" opacity="0.4"/>
  <circle cx="40" cy="332" r="9" fill="#F4A460" opacity="0.5"/>
  <circle cx="40" cy="180" r="10" fill="#F4A460" opacity="0.6"/>
  <circle cx="112" cy="72" r="8" fill="#F4A460" opacity="0.4"/>

  <!-- Small star decorations for warmth -->
  <text x="110" y="132" font-size="36" fill="#FFF" opacity="0.5">&#9733;</text>
  <text x="380" y="416" font-size="30" fill="#FFF" opacity="0.4">&#9733;</text>
  <text x="396" y="120" font-size="24" fill="#FFF" opacity="0.3">&#9733;</text>
  <text x="120" y="410" font-size="20" fill="#FFF" opacity="0.25">&#9733;</text>

  <!-- Chunky offset shadow text (storybook feel) -->
  <text
    x="264"
    y="292"
    text-anchor="middle"
    font-family="'Comic Neue', 'Comic Sans MS', 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="180"
    fill="rgba(0,0,0,0.12)"
    letter-spacing="6"
  >KM</text>

  <!-- Main "KM" text -->
  <text
    x="256"
    y="284"
    text-anchor="middle"
    font-family="'Comic Neue', 'Comic Sans MS', 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="180"
    fill="#FFFFFF"
    letter-spacing="6"
  >KM</text>

  <defs>
    <radialGradient id="innerGlow512" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
</svg>
