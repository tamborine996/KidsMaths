<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Cream background circle (border ring) -->
  <circle cx="96" cy="96" r="90" fill="#F7F3E9" stroke="#E8DFD0" stroke-width="2"/>

  <!-- Warm gold main circle -->
  <circle cx="96" cy="96" r="76" fill="#F4A460"/>

  <!-- Subtle inner shadow for depth -->
  <circle cx="96" cy="96" r="76" fill="url(#innerGlow192)"/>

  <!-- Playful dots decoration around the ring -->
  <circle cx="96" cy="12" r="4" fill="#F4A460" opacity="0.6"/>
  <circle cx="150" cy="30" r="3.5" fill="#F4A460" opacity="0.5"/>
  <circle cx="174" cy="72" r="3" fill="#F4A460" opacity="0.4"/>
  <circle cx="174" cy="120" r="3.5" fill="#F4A460" opacity="0.5"/>
  <circle cx="150" cy="162" r="4" fill="#F4A460" opacity="0.6"/>
  <circle cx="96" cy="180" r="3.5" fill="#F4A460" opacity="0.5"/>
  <circle cx="42" cy="162" r="3" fill="#F4A460" opacity="0.4"/>
  <circle cx="18" cy="120" r="3.5" fill="#F4A460" opacity="0.5"/>
  <circle cx="18" cy="72" r="4" fill="#F4A460" opacity="0.6"/>
  <circle cx="42" cy="30" r="3" fill="#F4A460" opacity="0.4"/>

  <!-- Small star decorations -->
  <text x="44" y="52" font-size="14" fill="#FFF" opacity="0.5">&#9733;</text>
  <text x="140" y="156" font-size="12" fill="#FFF" opacity="0.4">&#9733;</text>
  <text x="148" y="48" font-size="10" fill="#FFF" opacity="0.3">&#9733;</text>

  <!-- "KM" text - friendly, bold, slightly playful -->
  <text
    x="96"
    y="108"
    text-anchor="middle"
    font-family="'Comic Neue', 'Comic Sans MS', 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="68"
    fill="#FFFFFF"
    letter-spacing="2"
  >KM</text>

  <!-- Chunky offset shadow text (behind, for storybook feel) -->
  <text
    x="99"
    y="111"
    text-anchor="middle"
    font-family="'Comic Neue', 'Comic Sans MS', 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="68"
    fill="rgba(0,0,0,0.12)"
    letter-spacing="2"
  >KM</text>

  <!-- Main "KM" text on top -->
  <text
    x="96"
    y="108"
    text-anchor="middle"
    font-family="'Comic Neue', 'Comic Sans MS', 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="68"
    fill="#FFFFFF"
    letter-spacing="2"
  >KM</text>

  <defs>
    <radialGradient id="innerGlow192" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
</svg>
